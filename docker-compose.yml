version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: postgres_ai
    restart: always
    environment:
      # Aqui o Compose busca os valores dentro do arquivo .env
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT_HOST}:5432"
    volumes:
      - ./database/data:/var/lib/postgresql/data
    networks:
      - ai_network

  app:
    image: python:3.11-slim
    container_name: agent_app
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - PYTHONPATH=/app/src
      # Note como centralizamos a URL de conexão usando as mesmas variáveis
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    tty: true 
    stdin_open: true
    depends_on:
      - db
    networks:
      - ai_network

networks:
  ai_network:
    driver: bridge